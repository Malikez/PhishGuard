name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

env:
  PROJECT_ID: phishguard-v11  # Replace with your GCP Project ID
  REGION: us-central1              # Replace with your chosen region
  SERVICE: phishing-backend        # Name your Cloud Run service

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Authorize Docker push
      run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

    - name: Build and Deploy to Cloud Run
      run: |
        gcloud run deploy ${{ env.SERVICE }} \
          --source . \
          --region ${{ env.REGION }} \
          --allow-unauthenticated \
          --set-env-vars APIFLASH_KEY=${{ secrets.APIFLASH_KEY }}